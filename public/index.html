<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asrithpillai API Server</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter',
          sans-serif;
        background: #0a0a0a;
        height: 100vh;
        width: 100vw;
        overflow: hidden; /* 👈 no scroll */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(0, 149, 255, 0.1),
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 229, 255, 0.08),
            transparent 50%
          );
        pointer-events: none;
      }

      .container {
        background: rgba(18, 18, 18, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 48px;
        max-width: 720px;
        width: 100%;
        max-height: calc(100vh - 40px); /* 👈 stays inside screen */
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      }

      .logo-container {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        background: linear-gradient(135deg, #0095ff, #00e5ff);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: white;
        clip-path: polygon(
          50% 0%,
          100% 25%,
          100% 75%,
          50% 100%,
          0% 75%,
          0% 25%
        );
      }

      h1 {
        color: white;
        font-size: 2.5rem;
        margin-bottom: 12px;
      }

      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 32px;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }

      .status-card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 18px;
        text-align: left;
      }

      .status-label {
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
        margin-bottom: 8px;
        text-transform: uppercase;
      }

      .status-value {
        color: white;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00e5ff;
        box-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
      }

      .metrics {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 14px;
        padding: 18px;
        margin-bottom: 28px;
        text-align: left;
      }

      .metrics div {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        color: rgba(255, 255, 255, 0.8);
      }

      .metrics span:last-child {
        color: #00e5ff;
        font-weight: 600;
      }

      .cta {
        margin-top: auto;
      }

      .cta a {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 36px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #0095ff, #00e5ff);
      }

      .footer {
        margin-top: 20px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.4);
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 2rem;
        }

        .status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="logo-container">
        <div class="logo-icon"></div>
      </div>

      <h1>Asrithpillai API Server</h1>
      <p class="subtitle">AI Service Management Platform</p>

      <div class="status-grid">
        <div class="status-card">
          <div class="status-label">System</div>
          <div class="status-value"><span class="dot"></span> Online</div>
        </div>

        <div class="status-card">
          <div class="status-label">Version</div>
          <div class="status-value">v1.0.0</div>
        </div>

        <div class="status-card">
          <div class="status-label">Database</div>
          <div class="status-value"><span class="dot"></span> Connected</div>
        </div>

        <div class="status-card">
          <div class="status-label">Environment</div>
          <div class="status-value">Production</div>
        </div>
      </div>

      <div class="metrics">
        <div><span>Uptime</span><span>99.98%</span></div>
        <div><span>Response Time</span><span>42ms</span></div>
        <div><span>Connections</span><span>1,247</span></div>
      </div>

      <div class="cta">
        <a href="/docs">View API Documentation</a>
      </div>

      <div class="footer">Powered by Asrithpillai Infrastructure</div>
    </div>
  </body>
</html>
